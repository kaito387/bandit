program: run_tree_shape_sweep.py
method: grid
metric:
  name: algorithms_summary/PS/finalAvgRegret
  goal: minimize
parameters:
  K:
    value: 4
  S:
    value: 4
  rounds:
    value: 2000000
  seed:
    value: 42
  algo:
    values: ["PS","E3","E3Q","EE3","R","Q"]
  ratio:
    values: [0, 0.2, 0.5, 0.8, 1]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
