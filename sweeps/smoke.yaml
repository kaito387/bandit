program: run_tree_shape_sweep.py
method: grid
metric:
  name: algorithms_summary/finalAvgRegret
  goal: minimize
parameters:
  wandb-group:
    value: "smoke_test"
  tree-shape:
    value: "mix-full-binary"
  K:
    value: 2
  S:
    value: 2
  rounds:
    value: 50000
  algo:
    value: "PS"
  ratio:
    value: 0.8
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --regen-tree-each-run
  - ${args}
