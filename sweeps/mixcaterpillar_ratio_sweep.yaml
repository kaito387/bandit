program: run_tree_shape_sweep.py
method: grid
metric:
  name: algorithms_summary/finalAvgRegret
  goal: minimize
parameters:
  tree-shape:
    value: "mixcaterpillar"
  K:
    values: [2, 3, 4, 5, 6, 7, 8]
  rounds:
    value: 100000000
  algo:
    value: "PS"
  ratio:
    values: [0, 0.2, 0.4, 0.5, 0.6, 0.7, 0.75, 0.8, 0.85, 0.9, 0.92, 0.93, 0.94, 0.95, 0.96, 0.97, 0.98, 0.985, 0.99, 0.995, 1]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --regen-tree-each-run
  - ${args}