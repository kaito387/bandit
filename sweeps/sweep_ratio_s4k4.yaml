program: run_tree_shape_sweep.py
method: grid
metric:
  name: algorithms_summary/PS/finalAvgRegret
  goal: minimize
parameters:
  tree-shape:
    value: "full-binary"
  K:
    value: 4
  S:
    value: 4
  rounds:
    value: 5000000
  seed:
    value: 42
  algo:
    value: "PS"
  ratio:
    values: [0, 0.2, 0.5, 0.8, 1]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
