program: run_tree_shape_sweep.py
method: grid
metric:
  name: algorithms_summary/finalAvgRegret
  goal: minimize
parameters:
  tree-shape:
    value: "mix-full-binary"
  K:
    values: [2, 3, 4, 5, 6, 7]
  S:
    value: 2
  rounds:
    value: 5000000
  seed:
    value: 42
  algo:
    value: "PS"
  ratio:
    values: [0.2, 0.4, 0.6, 0.7, 0.8, 0.85, 0.9, 0.925, 0.95, 0.9625, 0.975, 0.98, 0.985, 0.99, 0.995, 1]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --regen-tree-each-run
  - ${args}
