program: run_tree_shape_sweep.py
method: grid
metric:
  name: algorithms_summary/finalAvgRegret
  goal: minimize
parameters:
  tree-shape:
    value: "mixcaterpillar"
  K:
    values: [2, 3, 4, 5, 6, 7, 8]
  rounds:
    value: 100000000
  algo:
    values: ["E3", "EE3", "E3Q"]
  ratio:
    value: 0
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --regen-tree-each-run
  - ${args}