program: run_tree_shape_sweep.py
method: grid
metric:
  name: algorithms_summary/finalAvgRegret
  goal: minimize
parameters:
  tree-shape:
    value: "full-binary"
  K:
    values: [3, 5, 7]
  S:
    value: 4
  rounds:
    value: 10000000
  seed:
    value: 42
  algo:
    values: ["PS", "E3", "E3Q", "EE3", "R", "Q"]
  ratio:
    value: 0.75
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
